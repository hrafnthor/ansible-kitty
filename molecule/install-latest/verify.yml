---
- name: Verify
  hosts: all
  tasks:

  - name: Load role input variables
    include_vars:
      file: "input-vars.yml"

  - name: Load role defaults
    include_vars:
      file: "../../defaults/main.yml"

  - name: Fetch latest version
    ansible.builtin.uri:
      url: "{{ hth_default_kitty_latest_version_url }}"
      return_content: yes
    register: kitty_latest_version_result

  - name: Set latest version
    ansible.builtin.set_fact:
      kitty_latest_version: "{{ kitty_latest_version_result.content }}"

  - name: Check for latest version install dir presence
    stat:
      path: "{{ hth_default_kitty_linux_installation_path }}/{{ kitty_latest_version }}/bin/kitty"
    register: kitty_latest_version_dir_stat

  - name: Check for latest version kitty symlink presence
    stat:
      path: "{{ hth_default_kitty_linux_symlink_path }}/kitty"
    register: kitty_latest_version_symlink_stat

  - name: Check for latest version kitten symlink presence
    stat:
      path: "{{ hth_default_kitty_linux_symlink_path }}/kitten"
    register: kitty_kitten_latest_version_symlink_stat

  - name: Check for latest version desktop file presence
    stat:
      path: "{{ hth_default_kitty_linux_desktop_entry_path }}/kitty.desktop"
    register: kitty_latest_version_desktop_stat

  - name: Fail when latest version install path is not found
    fail:
      msg: "Install directory for latest version '{{ kitty_latest_version }}' was not found!"
    when: not kitty_latest_version_dir_stat.stat.exists

  - name: Fail when latest kitty version is not found on path
    fail:
      msg: "Latest version '{{ kitty_latest_version }}' of kitty was not found on path!"
    when: not kitty_latest_version_symlink_stat.stat.exists

  - name: Fail when latest kitten version is not found on path
    fail:
      msg: "Latest version '{{ kitty_latest_version }}' of kitten was not found on path!"
    when: not kitty_kitten_latest_version_symlink_stat.stat.exists

  - name: Fail when latest version desktop entry is not found
    fail:
      msg: "Desktop entry not found for latest version '{{ kitty_latest_version }}'!"
    when: not kitty_latest_version_desktop_stat.stat.exists
