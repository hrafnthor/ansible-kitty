- name: "HTH | Kitty | Remove desktop entry"
  ansible.builtin.file:
    path: "{{ kitty_desktop_entry_path }}"
    state: absent

- name: "HTH | Kitty | Remove 'kitty' version from path"
  ansible.builtin.file:
    path: "{{ kitty_absolute_symlink_path }}"
    state: absent

- name: "HTH | Kitty | Remove 'kitten' version from path"
  ansible.builtin.file:
    path: "{{ kitten_absolute_symlink_path }}"
    state: absent

- name: "HTH | Kitty | Remove package location"
  ansible.builtin.file:
    path: "{{ hth_default_kitty_linux_installation_path }}"
    state: absent
